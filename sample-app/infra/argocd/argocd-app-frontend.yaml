apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: awseks-frontend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/siyeon04/awsskfront.git'
    targetRevision: HEAD
    path: 'manifests/frontend'
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true